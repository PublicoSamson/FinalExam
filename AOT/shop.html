<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phone Store - Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">PhoneStore</a>
    <div>
    <a class="nav-link text-white d-inline" href="index.html">Home</a>
    <a class="nav-link text-white d-inline" href="shop.html">Shop</a>
    <a class="nav-link text-white d-inline" href="contact.html">Contact</a>
    </div>
  </div>
</nav>

<!-- Products -->
<div class="container mt-5">
  <h2 class="text-center mb-4">Shop Phones</h2>

  <div class="row">

    <!-- Phone 1 -->
    <div class="col-md-4">
    <div class="card">
    <img src="iphone.jpg" class="card-img-top">
     <div class="card-body text-center">
      <h5>iPhone</h5>
      <p>₱30,000</p>
      <button class="btn btn-success" onclick="buy('iPhone')">Buy</button>
      </div>
      </div>
    </div>

    <!-- Phone 2 -->
    <div class="col-md-4">
     <div class="card">
     <img src="samsung.jpg" class="card-img-top">
     <div class="card-body text-center">
     <h5>Samsung</h5>
     <p>₱25,000</p>
     <button class="btn btn-success" onclick="buy('Samsung')">Buy</button>
        </div>
      </div>
    </div>

    <!-- Phone 3 -->
    <div class="col-md-4">
    <div class="card">
    <img src="xiaomi.jpg" class="card-img-top">
    <div class="card-body text-center">
    <h5>Xiaomi</h5>
          <p>₱16,000</p>
          <button class="btn btn-success" onclick="buy('Xiaomi')">Buy</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- JavaScript -->
<script>
  function buy(phone) {
    alert("You bought " + phone + " successfully!");
  }
</script>

</body>
